<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatter Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.header{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header-left{display:flex;align-items:center;gap:8px;}
.header-title{font-size:16px;font-weight:700;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-badge{font-size:11px;color:#888;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.month-badge{font-size:11px;color:#888;background:#f0f0f0;padding:3px 10px;border-radius:20px;}
.nav{display:flex;gap:4px;padding:12px 16px;background:#f5f5f3;overflow-x:auto;flex-wrap:nowrap;}
.nav-btn{padding:7px 14px;font-size:13px;font-weight:500;border-radius:20px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;color:#555;white-space:nowrap;flex-shrink:0;}
.nav-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.earnings-nav-btn{padding:7px 14px;font-size:13px;font-weight:500;border-radius:20px;border:1px solid #22c55e;background:#d6f0d6;cursor:pointer;color:#1a6e1a;white-space:nowrap;flex-shrink:0;}
.earnings-nav-btn.active{background:#1a6e1a;color:#fff;}
.btn{border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;}
.btn-dark{background:#1a1a1a;color:#fff;}
.btn-red{background:#fff;color:#e74c3c;border:1px solid #e74c3c;}
.view{display:none;padding:16px;}
.view.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e8;}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;color:#1a1a1a;}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #e8e8e8;}
.card-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;gap:8px;}
.row:last-child{border-bottom:none;}
.row-label{font-size:13px;color:#666;}
.row-val{font-size:13px;font-weight:600;color:#1a1a1a;}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bronze{background:#f0ece4;color:#7a6a50;}
.silver{background:#ddeeff;color:#1a5fa5;}
.gold{background:#fff3d6;color:#8a5e00;}
.elite{background:#d6f0d6;color:#1a6e1a;}
.bar-wrap{margin-bottom:14px;}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.bar-track{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ch-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-size:20px;font-weight:700;width:28px;color:#ccc;}
.lb-rank.first{color:#f0a500;}
.lb-info{flex:1;}
.lb-name{font-size:14px;font-weight:600;}
.lb-sub{font-size:12px;color:#888;margin-top:1px;}
.lb-pts{font-size:15px;font-weight:700;}
.qpill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:6px;}
.qyes{background:#d6f0d6;color:#1a6e1a;}
.qno{background:#ffe0e0;color:#c0392b;}
.tprog{background:#f8f8f8;border-radius:10px;padding:14px;margin-top:8px;}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px;}
.errmsg{background:#ffe0e0;color:#c0392b;border-radius:10px;padding:14px;font-size:13px;margin-bottom:12px;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px;}
.day-cell{border-radius:8px;padding:8px 4px;text-align:center;border:1px solid #f0f0f0;background:#fafafa;}
.day-name{font-size:9px;color:#aaa;margin-bottom:3px;}
.day-val{font-size:11px;font-weight:600;color:#1a1a1a;}
.chatter-box{background:#f8f8f8;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.chatter-box-title{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.reset-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;}
.reset-modal.show{display:flex;}
.reset-box{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:90%;text-align:center;}
.reset-box h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.reset-box p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.6;}
.reset-btns{display:flex;gap:10px;}
.reset-confirm{flex:1;background:#e74c3c;color:#fff;border:none;border-radius:20px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}
.reset-cancel{flex:1;background:#f0f0f0;color:#666;border:none;border-radius:20px;padding:10px;font-size:13px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Chatter Tracker</span>
    <span class="month-badge" id="month-badge">All time</span>
  </div>
  <div class="header-right">
    <span class="sync-badge"><span class="dot"></span><span id="sync-time">Loading...</span></span>
    <button class="btn btn-dark" id="refresh-btn" onclick="loadData()" style="display:none;">Refresh</button>
    <button class="btn btn-red" id="reset-btn" onclick="openReset()" style="display:none;">New Month</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <button class="nav-btn active" onclick="switchView('overview',this)">Overview</button>
  <button class="nav-btn" onclick="switchView('ebok',this)">Ebok</button>
  <button class="nav-btn" onclick="switchView('jericho',this)">Jericho</button>
  <button class="nav-btn" onclick="switchView('sean',this)">Sean</button>
  <button class="nav-btn" onclick="switchView('leaderboard',this)">Leaderboard</button>
  <button class="earnings-nav-btn" id="earnings-btn" onclick="switchView('owner',this)" style="display:none;">💰 My Earnings</button>
</div>

<div id="view-overview" class="view active"><div class="loading">Loading...</div></div>
<div id="view-ebok" class="view"><div class="loading">Loading...</div></div>
<div id="view-jericho" class="view"><div class="loading">Loading...</div></div>
<div id="view-sean" class="view"><div class="loading">Loading...</div></div>
<div id="view-leaderboard" class="view"><div class="loading">Loading...</div></div>
<div id="view-owner" class="view"><div class="loading">Loading...</div></div>

<div class="reset-modal" id="reset-modal">
  <div class="reset-box">
    <h3>Start new month?</h3>
    <p>This resets the tracker display to a fresh start. Your data stays safe in the Google Sheet — nothing gets deleted.</p>
    <div class="reset-btns">
      <button class="reset-cancel" onclick="closeReset()">Cancel</button>
      <button class="reset-confirm" onclick="confirmReset()">Yes, reset</button>
    </div>
  </div>
</div>

<script>
var API_KEY='AIzaSyDPtrts308VkcJ1O8mxuKE6GmB2x4awwe4';
var SHEET_ID='1o7t0iLnhTOgpDWz0wAY53F84kzv_EBdZKeMU6cRpZZE';
var PHP=57;
var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var FLOOR=400;
var HOURLY=16;

// ---- OWNER CHECK — must be first ----
var IS_OWNER = (window.location.hash === '#owner');
if(IS_OWNER){
  document.getElementById('refresh-btn').style.display='block';
  document.getElementById('reset-btn').style.display='block';
  document.getElementById('earnings-btn').style.display='block';
}

var CHATTERS=[
  {key:'ebok',   name:'Ebok',    initials:'EB', tab:'Ebok',    bg:'#ddeeff', color:'#1a5fa5'},
  {key:'jericho',name:'Jericho', initials:'JR', tab:'Jericho', bg:'#fff3d6', color:'#8a5e00'},
  {key:'sean',   name:'Sean',    initials:'SE', tab:'Sean',    bg:'#e6e0ff', color:'#5a3fa5'}
];

function getTier(g){
  if(g>=2500)return{key:'elite', label:'Elite', name:'Beast',  bonus:8, cls:'elite',  color:'#22c55e'};
  if(g>=1875)return{key:'gold',  label:'Gold',  name:'Hunter', bonus:5, cls:'gold',   color:'#f0a500'};
  if(g>=1250)return{key:'silver',label:'Silver',name:'Closer', bonus:3, cls:'silver', color:'#3b82f6'};
  if(g>=1000)return{key:'bronze',label:'Bronze',name:'Grinder',bonus:0, cls:'bronze', color:'#aaa'};
  return null;
}

function calc(gross){
  var net=gross*0.8;
  var tier=getTier(gross);
  var belowFloor=gross<FLOOR;
  var hourly=belowFloor?0:HOURLY;
  var commission=gross>=1000?net*0.01:0;
  var cashBonus=tier?tier.bonus:0;
  var theirPay=hourly+commission+cashBonus;
  var yourRev=net*0.07;
  var yourNet=yourRev-theirPay;
  return{net:net,tier:tier,belowFloor:belowFloor,commission:commission,hourly:hourly,cashBonus:cashBonus,theirPay:theirPay,yourRev:yourRev,yourNet:yourNet};
}

var DATA={};
CHATTERS.forEach(function(c){DATA[c.key]={};});

function parseGross(str){
  if(!str)return 0;
  var s=str.trim();
  if(s==='-'||s==='\u2013'||s==='\u2014')return 0;
  return parseFloat(s.replace(/[$,]/g,''))||0;
}

function fetchSheet(range){
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+'?key='+API_KEY;
  return fetch(url).then(function(r){return r.json();}).then(function(d){return d.values||[];}).catch(function(){return[];});
}

function loadData(){
  document.querySelectorAll('.view').forEach(function(v){v.innerHTML='<div class="loading">Syncing...</div>';});
  return Promise.all(CHATTERS.map(function(c){return fetchSheet(c.tab+'!H4:I10');}))
  .then(function(results){
    CHATTERS.forEach(function(c){DATA[c.key]={};});
    CHATTERS.forEach(function(c,ci){
      var byDay=results[ci];
      DAYS.forEach(function(day,i){
        var g=parseGross((byDay[i]||[])[0]);
        if(g>0)DATA[c.key][day]={gross:g,net:g*0.8};
      });
    });
    document.getElementById('sync-time').textContent='Synced '+new Date().toLocaleTimeString();
    renderAll();
  }).catch(function(e){
    document.querySelectorAll('.view').forEach(function(v){v.innerHTML='<div class="errmsg">Error: '+e.message+'</div>';});
    document.getElementById('sync-time').textContent='Sync failed';
  });
}

function getWeek(chatter){
  return DAYS.map(function(d){return{day:d,data:DATA[chatter][d]||null};});
}

function bar(label,current,target,bonus,color){
  var pct=Math.min(100,Math.round(current/target*100));
  var hit=current>=target;
  return '<div class="bar-wrap"><div class="bar-meta"><span style="color:#666;">'+label+' \u2014 $'+target.toLocaleString()+' net</span><span style="font-weight:600;color:'+(hit?'#22c55e':'#1a1a1a')+';">'+(hit?'+$'+bonus+' unlocked!':'$'+Math.round(current).toLocaleString()+' / $'+target.toLocaleString())+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(hit?'#22c55e':color)+';"></div></div></div>';
}

function renderOverview(){
  var totalsG={};var cg=0;var tierByChatter={};
  CHATTERS.forEach(function(c){
    var w=getWeek(c.key);
    var g=w.reduce(function(s,d){return s+(d.data?d.data.gross:0);},0);
    totalsG[c.key]=g;cg+=g;
    var pd=w.filter(function(d){return d.data;});
    tierByChatter[c.key]=pd.length?getTier(g/pd.length):null;
  });
  var cn=cg*0.8;
  var dayGrid=DAYS.map(function(d){
    var g=0,active=0;
    CHATTERS.forEach(function(c){if(DATA[c.key][d]){g+=DATA[c.key][d].gross;active++;}});
    var t=active>0&&g>0?getTier(g/active):null;
    var bg=t?'background:'+t.color+'20;border-color:'+t.color+'50;':'';
    var vc=t?'color:'+t.color+';':'color:#bbb;';
    return '<div class="day-cell" style="'+bg+'"><p class="day-name">'+d.slice(0,3)+'</p><p class="day-val" style="'+vc+'">'+(active>0&&g>0?'$'+Math.round(g).toLocaleString():'\u2014')+'</p></div>';
  }).join('');
  var snapRows=CHATTERS.map(function(c){
    var t=tierByChatter[c.key];
    return '<div class="row"><span class="row-label">'+c.name+' \u2014 $'+Math.round(totalsG[c.key]).toLocaleString()+' gross</span><span class="row-val">'+(t?'<span class="pill '+t.cls+'">'+t.label+' avg</span>':'\u2014')+'</span></div>';
  }).join('');
  document.getElementById('view-overview').innerHTML=
    '<div class="stat-grid">'
    +'<div class="stat"><p class="stat-label">Combined gross</p><p class="stat-val">$'+Math.round(cg).toLocaleString()+'</p><p class="stat-sub">This week</p></div>'
    +'<div class="stat"><p class="stat-label">Combined net</p><p class="stat-val">$'+Math.round(cn).toLocaleString()+'</p><p class="stat-sub">This week</p></div>'
    +'</div>'
    +'<div class="card"><p class="card-title">Week by day</p><div class="day-grid">'+dayGrid+'</div></div>'
    +'<div class="card"><p class="card-title">Chatter snapshot</p>'+snapRows+'</div>';
}

function renderChatter(chatter){
  var cfg=CHATTERS.filter(function(c){return c.key===chatter;})[0];
  var week=getWeek(chatter);
  var active=week.filter(function(d){return d.data;});
  var wG=active.reduce(function(s,d){return s+d.data.gross;},0);
  var wN=wG*0.8;
  var calcs=active.map(function(d){var c=calc(d.data.gross);c.day=d.day;return c;});
  var lT=active.length?getTier(active[active.length-1].data.gross):null;
  var dCash=calcs.reduce(function(s,c){return s+c.cashBonus;},0);
  var comm=calcs.reduce(function(s,c){return s+c.commission;},0);
  var tPay=calcs.reduce(function(s,c){return s+c.theirPay;},0);
  var paidDays=calcs.filter(function(c){return!c.belowFloor;}).length;
  var targets=[{label:'Silver week',target:7000,bonus:30,color:'#3b82f6'},{label:'Gold week',target:10500,bonus:50,color:'#f0a500'},{label:'Elite week',target:14000,bonus:75,color:'#22c55e'}];
  var hT=targets.filter(function(t){return wN>=t.target;});
  var top=hT[hT.length-1];
  var bonusRows='';
  if(top)bonusRows+='<div class="row"><span class="row-label">'+top.label+' bonus</span><span class="row-val" style="color:#22c55e;">+$'+top.bonus+'</span></div>';
  if(dCash>0)bonusRows+='<div class="row"><span class="row-label">Daily cash bonuses</span><span class="row-val" style="color:#22c55e;">+$'+dCash+'</span></div>';
  if(comm>0)bonusRows+='<div class="row"><span class="row-label">1% net commission</span><span class="row-val" style="color:#22c55e;">+$'+comm.toFixed(2)+'</span></div>';
  bonusRows+='<div class="row"><span class="row-label">Base hourly ('+paidDays+' days)</span><span class="row-val">$'+(paidDays*HOURLY)+'</span></div>';
  bonusRows+='<div class="row"><span class="row-label">Total earnings this week</span><span class="row-val">$'+tPay.toFixed(2)+'</span></div>';
  var dayRows=active.length?active.map(function(d){
    var c=calc(d.data.gross);var t=c.tier;
    var tpill=c.belowFloor?'<span style="font-size:11px;color:#c0392b;">Below floor</span>':(t?'<span class="pill '+t.cls+'">'+t.label+'</span>':'');
    var btext=c.cashBonus>0?'<span style="font-size:12px;color:#22c55e;">+$'+c.cashBonus+'</span>':'';
    return '<div class="row"><span class="row-label">'+d.day+'</span>'+tpill+'<span class="row-val">$'+Math.round(d.data.gross).toLocaleString()+'</span>'+btext+'</div>';
  }).join(''):'<p style="font-size:13px;color:#aaa;padding:8px 0;">No days logged yet.</p>';
  document.getElementById('view-'+chatter).innerHTML=
    '<div class="ch-header"><div class="avatar" style="background:'+cfg.bg+';color:'+cfg.color+';">'+cfg.initials+'</div><div style="flex:1;"><p style="font-size:16px;font-weight:700;">'+cfg.name+'</p><p style="font-size:12px;color:#888;">'+(lT?lT.label+' \u2014 '+lT.name:'No data yet')+'</p></div>'+(lT?'<span class="pill '+lT.cls+'">'+lT.label+'</span>':'')+'</div>'
    +'<div class="stat-grid">'
    +'<div class="stat"><p class="stat-label">Week gross</p><p class="stat-val">$'+Math.round(wG).toLocaleString()+'</p></div>'
    +'<div class="stat"><p class="stat-label">Week net</p><p class="stat-val">$'+Math.round(wN).toLocaleString()+'</p></div>'
    +'<div class="stat"><p class="stat-label">Avg gross/day</p><p class="stat-val">$'+(active.length?Math.round(wG/active.length).toLocaleString():'\u2014')+'</p></div>'
    +'<div class="stat"><p class="stat-label">Days logged</p><p class="stat-val">'+active.length+'</p></div>'
    +'</div>'
    +'<div class="card"><p class="card-title">Weekly bonus progress</p>'+targets.map(function(t){return bar(t.label,wN,t.target,t.bonus,t.color);}).join('')+'</div>'
    +'<div class="card"><p class="card-title">Day breakdown</p>'+dayRows+'</div>'
    +'<div class="card"><p class="card-title">Earnings this week</p>'+bonusRows+'</div>';
}

function renderLeaderboard(){
  var rows=CHATTERS.map(function(c){
    var w=getWeek(c.key).filter(function(d){return d.data;});
    var g=w.reduce(function(s,d){return s+d.data.gross;},0);
    var goldDays=w.filter(function(d){var t=getTier(d.data.gross);return t&&(t.key==='gold'||t.key==='elite');}).length;
    var hasBad=w.some(function(d){var t=getTier(d.data.gross);return!t||t.key==='bronze';});
    return{name:c.name,initials:c.initials,gross:g,goldDays:goldDays,qual:!hasBad,bg:c.bg,color:c.color,pts:0};
  });
  var maxG=Math.max.apply(null,rows.map(function(r){return r.gross;}));
  var maxGold=Math.max.apply(null,rows.map(function(r){return r.goldDays;}));
  rows.forEach(function(r){
    if(maxG>0){var topG=rows.filter(function(x){return x.gross===maxG;});r.pts+=(topG.length===1&&r.gross===maxG)?2:(r.gross===maxG?1:0);}
    if(maxGold>0){var topGl=rows.filter(function(x){return x.goldDays===maxGold;});r.pts+=(topGl.length===1&&r.goldDays===maxGold)?2:(r.goldDays===maxGold?1:0);}
  });
  rows.sort(function(a,b){return b.pts-a.pts||b.gross-a.gross;});
  var lbRows=rows.map(function(c,i){
    return '<div class="lb-row"><span class="lb-rank'+(i===0?' first':'')+'">'+(i+1)+'</span>'
      +'<div class="avatar" style="background:'+c.bg+';color:'+c.color+';width:34px;height:34px;font-size:12px;">'+c.initials+'</div>'
      +'<div class="lb-info"><p class="lb-name">'+c.name+'<span class="qpill '+(c.qual?'qyes':'qno')+'">'+(c.qual?'qualified':'bronze day')+'</span></p>'
      +'<p class="lb-sub">$'+Math.round(c.gross).toLocaleString()+' gross \u00b7 '+c.goldDays+' Gold/Elite days</p></div>'
      +'<span class="lb-pts">'+c.pts+'pts</span></div>';
  }).join('');
  var anyQual=rows.some(function(r){return r.qual;});
  var cg=rows.reduce(function(s,r){return s+r.gross;},0);
  var cNet=cg*0.8;var tT=21000;
  var tPct=Math.min(100,Math.round(cNet/tT*100));var tHit=cNet>=tT;
  var ruleRows=rows.map(function(c){
    return '<div class="row"><span class="row-label">'+c.name+' \u2014 zero bronze</span><span class="row-val" style="color:'+(c.qual?'#22c55e':'#e74c3c')+'">'+(c.qual?'Qualified':'Disqualified')+'</span></div>';
  }).join('');
  document.getElementById('view-leaderboard').innerHTML=
    '<div class="card"><p class="card-title">This week \u2014 $15 prize</p>'+lbRows
    +'<div style="background:#f8f8f8;border-radius:8px;padding:10px;margin-top:10px;font-size:12px;color:#666;">'+(anyQual?'Winner gets $15 on Sunday. Zero bronze days required.':'All disqualified \u2014 $15 rolls to next week.')+'</div></div>'
    +'<div class="card"><p class="card-title">Leaderboard rules</p>'+ruleRows+'</div>'
    +'<div class="card"><p class="card-title">Team bonus \u2014 $20 each</p><div class="tprog">'
    +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="color:#666;">Combined net: $'+tT.toLocaleString()+'</span><span style="font-weight:600;color:'+(tHit?'#22c55e':'#1a1a1a')+'">'+(tHit?'$20 each unlocked!':'$'+Math.round(cNet).toLocaleString()+' / $'+tT.toLocaleString())+'</span></div>'
    +'<div class="bar-track"><div class="bar-fill" style="width:'+tPct+'%;background:'+(tHit?'#22c55e':'#3b82f6')+';"></div></div>'
    +'<p style="font-size:11px;color:#aaa;margin-top:5px;">'+tPct+'% there</p></div></div>';
}

function renderOwner(){
  if(!IS_OWNER){
    document.getElementById('view-owner').innerHTML='<div class="loading">Owner access only.</div>';
    return;
  }
  var allC=[];var maxDays=0;var chatterStats={};
  CHATTERS.forEach(function(c){
    var w=getWeek(c.key).filter(function(d){return d.data;});
    maxDays=Math.max(maxDays,w.length);
    var cRev=0,cPay=0;
    w.forEach(function(d){var cc=calc(d.data.gross);allC.push(cc);cRev+=cc.yourRev;cPay+=cc.theirPay;});
    chatterStats[c.key]={name:c.name,rev:cRev,pay:cPay,net:cRev-cPay,days:w.length};
  });
  var rev=allC.reduce(function(s,c){return s+c.yourRev;},0);
  var pay=allC.reduce(function(s,c){return s+c.theirPay;},0);
  var net=rev-pay;
  var daily=maxDays?net/maxDays:0;
  var proj=daily*30;
  var on150=proj>=2631;var on200=proj>=3509;
  var chatterBreak=CHATTERS.map(function(c){
    var s=chatterStats[c.key];
    return '<div class="chatter-box">'
      +'<p class="chatter-box-title">'+s.name+' ('+s.days+' days)</p>'
      +'<div class="row"><span class="row-label">Revenue from '+s.name+'</span><span class="row-val">$'+s.rev.toFixed(2)+'</span></div>'
      +'<div class="row"><span class="row-label">'+s.name+' pay</span><span class="row-val" style="color:#e74c3c;">-$'+s.pay.toFixed(2)+'</span></div>'
      +'<div class="row" style="border-bottom:none;"><span class="row-label">Your net from '+s.name+'</span><span class="row-val" style="color:#22c55e;">$'+s.net.toFixed(2)+'</span></div>'
      +'</div>';
  }).join('');
  var targets=[{label:'$150k/mo (~$2,631)',usd:2631},{label:'$200k/mo (~$3,509)',usd:3509}].map(function(t){
    var hit=proj>=t.usd;
    return '<div class="row"><span class="row-label">'+t.label+'</span><span class="row-val" style="color:'+(hit?'#22c55e':'#e74c3c')+'">'+(hit?'On track':'$'+Math.abs(proj-t.usd).toFixed(0)+'/mo short')+'</span></div>';
  }).join('');
  document.getElementById('view-owner').innerHTML=
    '<div class="stat-grid">'
    +'<div class="stat"><p class="stat-label">Week revenue</p><p class="stat-val">$'+rev.toFixed(2)+'</p><p class="stat-sub">7% of net sales</p></div>'
    +'<div class="stat"><p class="stat-label">Week chatter pay</p><p class="stat-val">$'+pay.toFixed(2)+'</p></div>'
    +'<div class="stat"><p class="stat-label">Your week net</p><p class="stat-val" style="color:#22c55e;">$'+net.toFixed(2)+'</p></div>'
    +'<div class="stat"><p class="stat-label">Projected monthly</p><p class="stat-val" style="color:'+(on150?'#22c55e':'#e74c3c')+';">$'+Math.round(proj).toLocaleString()+'</p><p class="stat-sub">'+(on150?'On track':'Below target')+'</p></div>'
    +'</div>'
    +'<div class="card"><p class="card-title">This week \u2014 combined</p>'
    +'<div class="row"><span class="row-label">Gross revenue (7% of all net)</span><span class="row-val">$'+rev.toFixed(2)+'</span></div>'
    +'<div class="row"><span class="row-label">Total chatter pay</span><span class="row-val" style="color:#e74c3c;">-$'+pay.toFixed(2)+'</span></div>'
    +'<div class="row"><span class="row-label" style="font-weight:700;">Your weekly net</span><span class="row-val" style="color:#22c55e;font-size:15px;">$'+net.toFixed(2)+'</span></div>'
    +'</div>'
    +'<div class="card"><p class="card-title">This week \u2014 per chatter</p>'+chatterBreak+'</div>'
    +'<div class="card"><p class="card-title">Monthly projection (based on this week)</p>'
    +'<div class="row"><span class="row-label">Daily avg net ('+maxDays+' days)</span><span class="row-val">$'+daily.toFixed(2)+'/day</span></div>'
    +'<div class="row"><span class="row-label">Projected monthly net</span><span class="row-val" style="font-weight:700;">$'+Math.round(proj).toLocaleString()+'</span></div>'
    +targets+'</div>';
}

function renderAll(){
  renderOverview();
  CHATTERS.forEach(function(c){renderChatter(c.key);});
  renderLeaderboard();
  renderOwner();
}

function switchView(v,btn){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn,.earnings-nav-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
}

// Reset logic
var RESET_KEY='ct_reset_date';
function getResetDate(){var s=localStorage.getItem(RESET_KEY);return s?new Date(s):null;}
function openReset(){document.getElementById('reset-modal').classList.add('show');}
function closeReset(){document.getElementById('reset-modal').classList.remove('show');}
function confirmReset(){
  localStorage.setItem(RESET_KEY,new Date().toISOString());
  closeReset();updateMonthBadge();renderAll();
}
function updateMonthBadge(){
  var rd=getResetDate();
  var badge=document.getElementById('month-badge');
  badge.textContent=rd?'Since '+rd.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'All time';
}

updateMonthBadge();
loadData();
setInterval(loadData,300000);
</script>
